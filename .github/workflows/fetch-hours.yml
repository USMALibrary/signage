name: Fetch Library Hours

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch-hours:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch today's hours
        run: |
          curl -s "https://usma.libcal.com/api_hours_today.php?iid=4846&lid=0&format=json&systemTime=1" \
            -o data/hours-today.json

      - name: Fetch weekly hours
        run: |
          curl -s "https://usma.libcal.com/api_hours_grid.php?iid=4846&lid=0&format=json&weeks=1&systemTime=0" \
            -o data/hours-weekly.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hours-today.json data/hours-weekly.json
          git diff --staged --quiet || git commit -m "Update hours data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
