<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  #frame {
    position: absolute;
    inset: 20px;
    border: 1px solid rgba(200, 170, 100, 0.2);
  }

  #frame::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px;
    width: 40px; height: 3px;
    background: rgb(200, 170, 100);
  }

  #frame::after {
    content: '';
    position: absolute;
    top: -1px; left: -1px;
    width: 3px; height: 40px;
    background: rgb(200, 170, 100);
  }

  .corner-br {
    position: absolute;
    bottom: -1px; right: -1px;
    width: 40px; height: 3px;
    background: rgb(200, 170, 100);
  }

  .corner-br::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 3px; height: 40px;
    background: rgb(200, 170, 100);
  }

  #content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 1;
    text-align: center;
    padding: 40px;
  }

  #logo {
    width: 80px;
    height: auto;
    opacity: 0.6;
  }

  #divider {
    width: 60px;
    height: 1px;
    background: rgb(200, 170, 100);
    opacity: 0.5;
  }

  #headline {
    font-family: 'Oswald', sans-serif;
    font-size: 52px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 8px;
    text-transform: uppercase;
    line-height: 1;
  }

  #headline span { color: rgb(200, 170, 100); }

  #sub {
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    font-weight: 300;
    color: #666;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  #bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(200,170,100,0.04) 0%, transparent 70%);
  }
</style>
</head>
<body>
<div id="bg"></div>
<div id="frame"><div class="corner-br"></div></div>
<div id="content">
  <img id="logo"
    src="https://libapps.s3.amazonaws.com/accounts/87070/images/USMALibraryLogo.png"
    alt="USMA Library" onerror="this.style.display='none'">
  <div id="divider"></div>
  <div id="headline">COMING <span>SOON</span></div>
  <div id="sub">Content Update in Progress</div>
</div>
</body>
</html>
