<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>USMA Library – Portrait Display</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Open+Sans:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold:  rgb(200, 170, 100);
    --black: #0a0a0a;
    --dark:  #111111;
    --mid:   #1a1a1a;
    --border:#2a2a2a;
    --text:  #f0f0f0;
    --muted: #888;
  }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: var(--black);
    font-family: 'Open Sans', 'Segoe UI', Arial, sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  #header {
    width: 100%;
    height: 160px;
    background: var(--dark);
    border-bottom: 4px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    flex-shrink: 0;
  }

  #header-left {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  #logo { height: 90px; width: auto; }

  #header-title .lib-name {
    font-family: 'Oswald', sans-serif;
    font-size: 32px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: block;
  }

  #header-title .lib-sub {
    font-size: 15px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 300;
    margin-top: 4px;
    display: block;
  }

  #header-right { text-align: right; }

  #clock {
    font-family: 'Oswald', sans-serif;
    font-size: 52px;
    font-weight: 400;
    color: #fff;
    letter-spacing: 2px;
    line-height: 1;
  }

  #date {
    font-size: 15px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    padding: 18px 48px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
  }

  /* ── IMAGE ZONE ── */
  /* 
    This zone is intentionally left empty.
    Rise Vision's Image component will be layered
    on top of this area via the presentation editor.
    The zone provides the background and corner accents only.
  */
  #image-zone {
    width: 100%;
    flex: 1;
    position: relative;
    background: var(--mid);
    flex-shrink: 0;
    height: calc(1920px - 160px - 56px - 100px);
  }

  /* Gold corner accents */
  #image-zone::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 40px; height: 4px;
    background: var(--gold);
    z-index: 2;
  }

  #image-zone::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 40px;
    background: var(--gold);
    z-index: 2;
  }

  /* ── FOOTER ── */
  #footer {
    height: 100px;
    background: var(--dark);
    border-top: 4px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    flex-shrink: 0;
  }

  #footer-url {
    font-family: 'Oswald', sans-serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 2px;
  }

  #footer-helpdesk {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 300;
    color: #ccc;
    letter-spacing: 2px;
    text-align: right;
  }

  #footer-helpdesk span {
    color: var(--gold);
    font-weight: 600;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="header-left">
    <img id="logo"
      src="https://libapps.s3.amazonaws.com/accounts/87070/images/USMALibraryLogo.png"
      alt="USMA Library"
      onerror="this.style.display='none'">
    <div id="header-title">
      <span class="lib-name">Jefferson Hall Library</span>
      <span class="lib-sub">United States Military Academy</span>
    </div>
  </div>
  <div id="header-right">
    <div id="clock">--:-- --</div>
    <div id="date">--</div>
  </div>
</div>

<!-- SECTION LABEL -->
<div class="section-label">News &amp; Announcements</div>

<!-- IMAGE ZONE — Rise Vision Image component goes here -->
<div id="image-zone"></div>

<!-- FOOTER -->
<div id="footer">
  <div id="footer-url">library.westpoint.edu</div>
  <div id="footer-helpdesk">Help Kiosk &nbsp;·&nbsp; <span>2nd Floor</span></div>
</div>

<script>
  function updateClock() {
    var now = new Date();
    var h = now.getHours(), m = now.getMinutes().toString().padStart(2,'0');
    var ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('clock').textContent = h + ':' + m + ' ' + ampm;
    var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var d = new Date();
    document.getElementById('date').textContent =
      days[d.getDay()].toUpperCase() + ' · ' + months[d.getMonth()].toUpperCase() + ' ' + d.getDate();
  }
  updateClock();
  setInterval(updateClock, 30000);
</script>
</body>
</html>
