<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>USMA Library – Haig Room</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Open+Sans:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold:  rgb(200, 170, 100);
    --black: #0a0a0a;
    --dark:  #111111;
    --mid:   #1a1a1a;
    --border:#2a2a2a;
    --text:  #f0f0f0;
    --muted: #888;
  }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: var(--black);
    font-family: 'Open Sans', 'Segoe UI', Arial, sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  #header {
    width: 100%;
    height: 130px;
    background: var(--dark);
    border-bottom: 4px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 60px;
    flex-shrink: 0;
  }

  #header-left {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  #logo { height: 80px; width: auto; }

  #header-title .lib-name {
    font-family: 'Oswald', sans-serif;
    font-size: 36px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: block;
  }

  #header-title .lib-sub {
    font-size: 17px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 300;
    margin-top: 2px;
    display: block;
  }

  #header-right { text-align: right; }

  #clock {
    font-family: 'Oswald', sans-serif;
    font-size: 56px;
    font-weight: 400;
    color: #fff;
    letter-spacing: 2px;
    line-height: 1;
  }

  #date {
    font-size: 17px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    padding: 16px 60px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
  }

  /* ── IMAGE ZONE ── */
  #image-zone {
    width: 100%;
    flex: 1;
    position: relative;
    background: var(--black);
    flex-shrink: 0;
  }

  /* ── FOOTER ── */
  #footer {
    height: 90px;
    background: var(--dark);
    border-top: 4px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 60px;
    flex-shrink: 0;
  }

  #footer-url {
    font-family: 'Oswald', sans-serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 2px;
  }

  #footer-right {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 300;
    color: #ccc;
    letter-spacing: 2px;
    text-align: right;
  }

  #footer-right span {
    color: var(--gold);
    font-weight: 600;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="header-left">
    <img id="logo"
      src="https://libapps.s3.amazonaws.com/accounts/87070/images/USMALibraryLogo.png"
      alt="USMA Library"
      onerror="this.style.display='none'">
    <div id="header-title">
      <span class="lib-name">Jefferson Hall Library</span>
      <span class="lib-sub">United States Military Academy · West Point</span>
    </div>
  </div>
  <div id="header-right">
    <div id="clock">--:-- --</div>
    <div id="date">--</div>
  </div>
</div>

<!-- SECTION LABEL -->
<div class="section-label">Welcome to the Alexander Haig Room</div>

<!-- IMAGE ZONE — Rise Vision Image component goes here -->
<div id="image-zone"></div>

<!-- FOOTER -->
<div id="footer">
  <div id="footer-url">library.westpoint.edu</div>
  <div id="footer-right">Help Kiosk &nbsp;·&nbsp; <span>2nd Floor</span></div>
</div>

<script>
  function updateClock() {
    var now = new Date();
    var h = now.getHours(), m = now.getMinutes().toString().padStart(2,'0');
    var ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('clock').textContent = h + ':' + m + ' ' + ampm;
    var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var d = new Date();
    document.getElementById('date').textContent =
      days[d.getDay()].toUpperCase() + ' · ' + months[d.getMonth()].toUpperCase() + ' ' + d.getDate();
  }
  updateClock();
  setInterval(updateClock, 30000);
</script>
</body>
</html>
