<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>USMA Library Hours</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Open+Sans:wght@300;400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Open Sans', 'Segoe UI', Arial, sans-serif;
    background: #0a0a0a; color: #f0f0f0;
  }
  #header {
    width: 100%; height: 130px; background: #111;
    border-bottom: 4px solid rgb(200,170,100);
    display: flex; align-items: center; justify-content: space-between; padding: 0 60px;
  }
  #header-left { display: flex; align-items: center; gap: 28px; }
  #logo { height: 80px; width: auto; filter: brightness(1.1); }
  #header-title { display: flex; flex-direction: column; }
  #header-title .lib-name {
    font-family: 'Oswald', sans-serif; font-size: 36px; font-weight: 600;
    color: rgb(200,170,100); letter-spacing: 2px; text-transform: uppercase;
  }
  #header-title .lib-sub {
    font-size: 18px; color: #aaa; letter-spacing: 3px;
    text-transform: uppercase; font-weight: 300; margin-top: 2px;
  }
  #header-right { text-align: right; }
  #clock {
    font-family: 'Oswald', sans-serif; font-size: 56px; font-weight: 400;
    color: #fff; letter-spacing: 2px; line-height: 1;
  }
  #date {
    font-size: 18px; color: #999; letter-spacing: 2px;
    text-transform: uppercase; margin-top: 4px;
  }
  #status-bar {
    width: 100%; height: 400px; display: flex; align-items: center;
    justify-content: center; gap: 40px; background: #1a4d1a;
    border-bottom: 3px solid #2d7a2d; position: relative; overflow: hidden;
  }
  #status-bar::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
  }
  #status-bar.closed { background: #4d1a1a; border-bottom-color: #8b0000; }
  #status-icon { font-size: 160px; line-height: 1; }
  #status-text {
    font-family: 'Oswald', sans-serif; font-size: 200px; font-weight: 700;
    color: #fff; letter-spacing: 12px; text-transform: uppercase;
    text-shadow: 0 0 60px rgba(255,255,255,0.2);
  }
  #status-bar.closed #status-text { color: #ff6b6b; }
  #today-strip {
    width: 100%; background: #1a1a1a; border-bottom: 1px solid #333;
    padding: 18px 60px; display: flex; align-items: center; gap: 48px;
  }
  #today-strip .strip-label {
    font-family: 'Oswald', sans-serif; font-size: 20px; letter-spacing: 3px;
    text-transform: uppercase; color: rgb(200,170,100); white-space: nowrap; flex-shrink: 0;
  }
  #today-strip .strip-divider { width: 2px; height: 36px; background: #444; flex-shrink: 0; }
  #today-locations { display: flex; gap: 60px; flex: 1; }
  .today-loc { display: flex; align-items: center; gap: 14px; }
  .today-loc .loc-name { font-size: 20px; color: #bbb; font-weight: 300; }
  .today-loc .loc-hours { font-size: 22px; font-weight: 600; color: #fff; }
  .today-loc .loc-hours.open { color: #6fcf6f; }
  .today-loc .loc-hours.closed { color: #cf6f6f; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot.open { background: #6fcf6f; box-shadow: 0 0 8px #6fcf6f; }
  .dot.closed { background: #cf6f6f; }
  #week-section {
    width: 100%; height: calc(1080px - 130px - 400px - 74px);
    background: #0f0f0f; padding: 20px 60px 16px; overflow: hidden;
  }
  #week-label {
    font-family: 'Oswald', sans-serif; font-size: 16px; letter-spacing: 3px;
    text-transform: uppercase; color: #666; margin-bottom: 14px;
  }
  #week-table { width: 100%; border-collapse: collapse; font-size: 20px; }
  #week-table th {
    background: #1e1e1e; color: #999; padding: 10px 6px; text-align: center;
    font-weight: 600; font-size: 17px; letter-spacing: 1px; text-transform: uppercase;
    border-bottom: 2px solid #333; border-right: 1px solid #2a2a2a;
  }
  #week-table th.today-col { color: rgb(200,170,100); border-bottom-color: rgb(200,170,100); }
  #week-table th.row-label { text-align: left; padding-left: 12px; color: #666; }
  #week-table td {
    padding: 12px 8px; text-align: center; border-bottom: 1px solid #1e1e1e;
    border-right: 1px solid #1a1a1a; color: #ccc; vertical-align: middle;
  }
  #week-table td.row-label {
    text-align: left; padding-left: 12px; color: #888; font-size: 18px;
    font-weight: 300; white-space: nowrap; border-right: 2px solid #333;
  }
  #week-table td.today-col { background: #1a1800; color: #fff; font-weight: 600; }
  #week-table tr:hover td { background: #161616; }
  #week-table tr:hover td.today-col { background: #1f1c00; }
  #footnote { font-size: 13px; color: #444; margin-top: 10px; }
</style>
</head>
<body>
<div id="header">
  <div id="header-left">
    <img id="logo" src="https://libapps.s3.amazonaws.com/accounts/87070/images/USMALibraryLogo.png" alt="USMA Library" onerror="this.style.display='none'">
    <div id="header-title">
      <span class="lib-name">Jefferson Hall Library</span>
      <span class="lib-sub">United States Military Academy · West Point</span>
    </div>
  </div>
  <div id="header-right">
    <div id="clock">--:-- --</div>
    <div id="date">--</div>
  </div>
</div>
<div id="status-bar">
  <div id="status-icon">⬤</div>
  <div id="status-text">CHECKING HOURS</div>
</div>
<div id="today-strip">
  <div class="strip-label">Today's Hours</div>
  <div class="strip-divider"></div>
  <div id="today-locations">Loading...</div>
</div>
<div id="week-section">
  <div id="week-label">This Week</div>
  <table id="week-table">
    <thead id="week-head"><tr><th class="row-label">Location</th></tr></thead>
    <tbody id="week-body">
      <tr><td colspan="8" style="color:#555;padding:20px 12px">Loading weekly hours...</td></tr>
    </tbody>
  </table>
  <div id="footnote"></div>
</div>
<script>
  function updateClock(){var n=new Date(),h=n.getHours(),m=n.getMinutes().toString().padStart(2,'0'),a=h>=12?'PM':'AM';h=h%12||12;document.getElementById('clock').textContent=h+':'+m+' '+a;var d=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];document.getElementById('date').textContent=d[n.getDay()].toUpperCase()+' · '+mo[n.getMonth()].toUpperCase()+' '+n.getDate()}updateClock();setInterval(updateClock,30000);
  function fmtRendered(r){if(!r||r==='Closed')return'Closed';return r.replace(/(\d{1,2}):(\d{2})/g,function(_,hh,mm){var h=parseInt(hh),a=h>=12?'PM':'AM';h=h%12||12;return h+':'+mm+' '+a}).replace(' - ',' – ')}
  function renderToday(d){var l=d.locations,h='',o=false;l.forEach(function(loc){var op=loc.times&&loc.times.currently_open;if(op)o=true;h+='<div class="today-loc"><div class="dot '+(op?'open':'closed')+'"></div><span class="loc-name">'+loc.name+'</span><span class="loc-hours '+(op?'open':'closed')+'">'+fmtRendered(loc.rendered)+'</span></div>'});document.getElementById('today-locations').innerHTML=h;var b=document.getElementById('status-bar'),i=document.getElementById('status-icon'),t=document.getElementById('status-text');if(o){b.className='';i.textContent='✓';t.textContent='OPEN'}else{b.className='closed';i.textContent='✕';t.textContent='CLOSED'}}
  function renderWeekly(d){var l=d.locations;if(!l||!l.length||!l[0].weeks||!l[0].weeks.length)return;var w=l[0].weeks[0],dk=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],tn=dk[new Date().getDay()],hr='<tr><th class="row-label">Location</th>';dk.forEach(function(d){var dd=w[d],lb=d.substring(0,3).toUpperCase();if(dd&&dd.date){var p=dd.date.split('-');if(p.length===3)lb+='<br><span style="font-size:14px;font-weight:300;opacity:0.6">'+parseInt(p[1])+'/'+parseInt(p[2])+'</span>'}hr+='<th'+(d===tn?' class="today-col"':'')+ '>'+lb+'</th>'});hr+='</tr>';document.getElementById('week-head').innerHTML=hr;var bh='',fn=[];l.forEach(function(loc){if(!loc.weeks||!loc.weeks.length)return;var wk=loc.weeks[0];bh+='<tr><td class="row-label">'+loc.name+'</td>';dk.forEach(function(d){var dd=wk[d],r=dd?fmtRendered(dd.rendered):'--',c=r==='Closed',s=c?' style="color:#555"':'';bh+='<td'+(d===tn?' class="today-col"':'')+s+'>'+r+'</td>'});bh+='</tr>';if(loc.fn)fn.push(loc.fn)});document.getElementById('week-body').innerHTML=bh;if(fn.length)document.getElementById('footnote').textContent=fn[0]}
  var BASE='https://usmalibrary.github.io/signage/data/';
  function loadJSON(u,cb,er){var x=new XMLHttpRequest();x.open('GET',u+'?v='+Date.now(),true);x.onreadystatechange=function(){if(x.readyState===4){if(x.status===200){try{cb(JSON.parse(x.responseText))}catch(e){if(er)er()}}else{if(er)er()}}};x.onerror=function(){if(er)er()};x.send()}
  function loadData(){loadJSON(BASE+'hours-today.json',renderToday,function(){document.getElementById('today-locations').textContent='Hours unavailable';document.getElementById('status-text').textContent='SEE STAFF'});loadJSON(BASE+'hours-weekly.json',renderWeekly,function(){document.getElementById('week-body').innerHTML='<tr><td colspan="8" style="color:#555;padding:20px">Weekly hours unavailable</td></tr>'})}
  loadData();setInterval(loadData,900000);
</script>
</body>
</html>
