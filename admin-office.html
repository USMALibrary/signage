<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>USMA Library – Admin Office</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Open+Sans:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold:   rgb(200, 170, 100);
    --black:  #0a0a0a;
    --dark:   #111111;
    --mid:    #1a1a1a;
    --border: #2a2a2a;
    --text:   #f0f0f0;
    --muted:  #888;
  }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: var(--black);
    font-family: 'Open Sans', 'Segoe UI', Arial, sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  #header {
    width: 100%;
    height: 100px;
    background: var(--dark);
    border-bottom: 4px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    flex-shrink: 0;
  }

  #header-left {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  #logo { height: 64px; width: auto; }

  #header-title .lib-name {
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: block;
  }

  #header-title .lib-sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 300;
    margin-top: 2px;
    display: block;
  }

  #header-right {
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── MAIN CONTENT ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── CALENDAR GRID ── */
  #calendar-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 3px;
    flex: 1;
    background: var(--border);
    overflow: hidden;
  }

  .cal-cell {
    background: #fff;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .cal-label {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
    background: var(--dark);
    padding: 6px 12px;
    border-bottom: 2px solid var(--gold);
    flex-shrink: 0;
  }

  .cal-cell iframe {
    width: 100%;
    flex: 1;
    border: none;
    transform-origin: top left;
  }

  /* ── RIGHT SIDEBAR ── */
  #sidebar {
    width: 340px;
    flex-shrink: 0;
    background: var(--dark);
    border-left: 4px solid var(--gold);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 24px;
    gap: 24px;
  }

  #clock {
    font-family: 'Oswald', sans-serif;
    font-size: 72px;
    font-weight: 300;
    color: #fff;
    letter-spacing: 2px;
    line-height: 1;
    text-align: center;
  }

  #date {
    font-size: 16px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    margin-top: -16px;
  }

  .sidebar-divider {
    width: 100%;
    height: 1px;
    background: var(--border);
  }

  #on-call-label {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  #on-call-status {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #6fcf6f;
    box-shadow: 0 0 8px #6fcf6f;
    flex-shrink: 0;
  }

  #on-call-name {
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    font-weight: 600;
    color: #fff;
    text-align: center;
    line-height: 1.3;
  }

  #on-call-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 16px;
  }

  #on-call-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar-section-label {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    width: 100%;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="header-left">
    <img id="logo"
      src="https://libapps.s3.amazonaws.com/accounts/87070/images/USMALibraryLogo.png"
      alt="USMA Library"
      onerror="this.style.display='none'">
    <div id="header-title">
      <span class="lib-name">Jefferson Hall Library – Room Bookings</span>
      <span class="lib-sub">United States Military Academy · West Point</span>
    </div>
  </div>
  <div id="header-right">Staff Dashboard</div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- 2x2 CALENDAR GRID -->
  <div id="calendar-grid">

    <div class="cal-cell">
      <div class="cal-label">Collaborative Rooms</div>
      <iframe src="https://usma.libcal.com/widget/equipment?gid=12559"
        title="Collaborative Rooms" scrolling="no"></iframe>
    </div>

    <div class="cal-cell">
      <div class="cal-label">Classrooms</div>
      <iframe src="https://usma.libcal.com/widget/equipment?gid=44650"
        title="Classrooms" scrolling="no"></iframe>
    </div>

    <div class="cal-cell">
      <div class="cal-label">Sixth Floor &amp; Haig Room</div>
      <iframe src="https://usma.libcal.com/widget/equipment?gid=15193"
        title="Sixth Floor and Haig Room" scrolling="no"></iframe>
    </div>

    <div class="cal-cell">
      <div class="cal-label">Library Staff Rooms</div>
      <iframe src="https://usma.libcal.com/widget/equipment?gid=15194"
        title="Library Staff Rooms" scrolling="no"></iframe>
    </div>

  </div>

  <!-- RIGHT SIDEBAR -->
  <div id="sidebar">
    <div id="clock">--:--</div>
    <div id="date">--</div>

    <div class="sidebar-divider"></div>

    <div id="on-call-box">
      <div class="sidebar-section-label">Now on Call</div>
      <div id="on-call-row">
        <div id="on-call-status"></div>
        <div id="on-call-name">Loading...</div>
      </div>
    </div>

    <div class="sidebar-divider"></div>

    <div id="on-call-label">Help Kiosk · 2nd Floor</div>
    <div style="font-size:13px;color:var(--muted);text-align:center;letter-spacing:1px;">library.westpoint.edu</div>
  </div>

</div>

<script>
  /* ── CLOCK ── */
  function updateClock() {
    var now = new Date();
    var h = now.getHours(), m = now.getMinutes().toString().padStart(2,'0');
    var ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('clock').textContent = h + ':' + m + ' ' + ampm;
    var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var d = new Date();
    document.getElementById('date').textContent =
      days[d.getDay()].toUpperCase() + ' · ' + months[d.getMonth()].toUpperCase() + ' ' + d.getDate();
  }
  updateClock();
  setInterval(updateClock, 30000);

  /* ── NOW ON CALL ── */
  /* 
    Reads from GitHub Pages JSON file updated by Power Automate.
    File: https://usmalibrary.github.io/signage/data/on-call.json
    Format: { "name": "Susan Lintelmann", "updated": "2026-07-15T09:00:00" }
  */
  function loadOnCall() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://usmalibrary.github.io/signage/data/on-call.json?v=' + Date.now(), true);
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4 && xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          document.getElementById('on-call-name').textContent = data.name || 'Not set';
        } catch(e) {
          document.getElementById('on-call-name').textContent = 'Unavailable';
        }
      } else if (xhr.readyState === 4) {
        document.getElementById('on-call-name').textContent = 'See Staff App';
      }
    };
    xhr.send();
  }

  loadOnCall();
  setInterval(loadOnCall, 120000); // refresh every 2 minutes
</script>
</body>
</html>
